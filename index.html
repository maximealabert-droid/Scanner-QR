<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner QR4</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 0;
  margin: 0;
  background: #f4f6f8;
}

.tabs {
  display: flex;
  background: #0078D4;
}

.tab-button {
  flex: 1;
  padding: 15px;
  border: none;
  background: #0078D4;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.tab-button.active {
  background: #005fa3;
}

.tab-content {
  display: none;
  padding: 20px;
}

.tab-content.active {
  display: block;
}

video {
  width: 100%;
  max-width: 350px;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  border-radius: 12px;
  background: black;
}

button.action {
  padding: 14px 20px;
  margin: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #0078D4;
  color: white;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  font-size: 28px;
  font-weight: bold;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100px;
}

.success {
  color: green;
}

.error {
  color: red;
}

ul {
  list-style: none;
  padding: 0;
  max-width: 400px;
  margin: 20px auto;
  text-align: left;
}

li {
  background: white;
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 4px;
  font-size: 14px;
  word-break: break-all;
}
</style>
</head>

<body>

<div class="tabs">
  <button class="tab-button active" onclick="openTab(event,'home')">Home</button>
  <button class="tab-button" onclick="openTab(event,'scan')">Scan</button>
</div>

<div id="home" class="tab-content active">
  <h2>🏠 Accueil</h2>
  <p>Bienvenue dans l'application Scanner QR4.</p>
</div>

<div id="scan" class="tab-content">
  <h2>📷 Scanner QR4</h2>

  <video id="video" muted playsinline></video>
  <br>

  <button id="startBtn" class="action" onclick="startScanner()">Démarrer</button>
  <button id="stopBtn" class="action" onclick="stopScanner()" style="display:none;">Stop</button>

  <div id="result"></div>

  <h3>Historique</h3>
  <ul id="history"></ul>
</div>

<script>
let codeReader = null;
let videoElement = document.getElementById('video');

function openTab(evt, tabName) {

  document.querySelectorAll('.tab-content').forEach(tab => {
    tab.classList.remove('active');
  });

  document.querySelectorAll('.tab-button').forEach(btn => {
    btn.classList.remove('active');
  });

  document.getElementById(tabName).classList.add('active');
  evt.currentTarget.classList.add('active');

  if (tabName !== 'scan') {
    stopScanner();
  }
}

async function startScanner() {
  if (codeReader) return;

  codeReader = new ZXing.BrowserQRCodeReader();

  document.getElementById("startBtn").style.display = "none";
  document.getElementById("stopBtn").style.display = "inline-block";
  document.getElementById("result").textContent = "";
  document.getElementById("result").className = "";

  try {
    codeReader.decodeFromVideoDevice(
      null,
      videoElement,
      (result, err) => {
        if (result) {
          const value = result.text.trim();
          handleResult(value);
          saveToHistory(value);
          stopScanner();
          loadHistory();
        }
      }
    );
  } catch (err) {
    showMessage("Erreur caméra", "error");
  }
}

function handleResult(value) {
  if (value === "acheteur1") {
    showMessage("Success", "success");
  } else if (value === "acheteur2") {
    showMessage("Echec", "error");
  } else {
    showMessage("QR inconnu", "error");
  }
}

function showMessage(message, type) {
  const resultDiv = document.getElementById("result");
  resultDiv.textContent = message;
  resultDiv.className = type;
}

function stopScanner() {
  if (codeReader) {
    codeReader.reset();
    codeReader = null;
  }

  document.getElementById("startBtn").style.display = "inline-block";
  document.getElementById("stopBtn").style.display = "none";
}

function saveToHistory(data) {
  let history = JSON.parse(localStorage.getItem("qrHistory")) || [];
  history.push({
    value: data,
    date: new Date().toLocaleString()
  });
  localStorage.setItem("qrHistory", JSON.stringify(history));
}

function loadHistory() {
  let history = JSON.parse(localStorage.getItem("qrHistory")) || [];
  const historyList = document.getElementById("history");
  historyList.innerHTML = "";

  history.slice().reverse().forEach(item => {
    let li = document.createElement("li");
    li.textContent = item.date + " - " + item.value;
    historyList.appendChild(li);
  });
}

loadHistory();
</script>

</body>
</html>
