<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>index_tabs_overlay_result.html</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 0;
  margin: 0;
  background: #f4f6f8;
}

.filename {
  font-size: 12px;
  color: #888;
  padding: 6px;
  background: #f0f0f0;
}

.tabs {
  display: flex;
  background: #0078D4;
}

.tab-button {
  flex: 1;
  padding: 15px;
  border: none;
  background: #0078D4;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.tab-button.active {
  background: #005fa3;
}

.tab-content {
  display: none;
  padding: 20px;
}

.tab-content.active {
  display: block;
}

/* Scanner container */
.scanner-container {
  position: relative;
  width: 100%;
  max-width: 350px;
  margin: 0 auto;
}

video {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  border-radius: 12px;
  background: black;
}

/* Overlay result centered over scanner */
.overlay-result {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 32px;
  font-weight: bold;
  color: white;
  border-radius: 12px;
  background: rgba(0,0,0,0.6);
  display: none;
}

.success {
  background: rgba(0, 128, 0, 0.8);
}

.error {
  background: rgba(200, 0, 0, 0.8);
}

button.action {
  padding: 14px 20px;
  margin: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #0078D4;
  color: white;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
  max-width: 400px;
  margin: 20px auto;
  text-align: left;
}

li {
  background: white;
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 4px;
  font-size: 14px;
  word-break: break-all;
}
</style>
</head>

<body>

<div class="filename">index_tabs_overlay_result.html</div>

<div class="tabs">
  <button class="tab-button active" onclick="openTab(event,'home')">Home</button>
  <button class="tab-button" onclick="openTab(event,'scan')">Scan</button>
</div>

<div id="home" class="tab-content active">
  <h2>🏠 Accueil</h2>
</div>

<div id="scan" class="tab-content">
  <h2>📷 Scanner QR4</h2>

  <div class="scanner-container">
    <video id="video" muted playsinline></video>
    <div id="overlay" class="overlay-result"></div>
  </div>

  <button id="startBtn" class="action" onclick="startScanner()">Démarrer</button>
  <button id="stopBtn" class="action" onclick="stopScanner()" style="display:none;">Stop</button>

  <h3>Historique</h3>
  <ul id="history"></ul>
</div>

<script>
let codeReader = null;
let videoElement = document.getElementById('video');
let overlay = document.getElementById("overlay");

function openTab(evt, tabName) {
  document.querySelectorAll('.tab-content').forEach(tab => {
    tab.classList.remove('active');
  });

  document.querySelectorAll('.tab-button').forEach(btn => {
    btn.classList.remove('active');
  });

  document.getElementById(tabName).classList.add('active');
  evt.currentTarget.classList.add('active');

  if (tabName === 'scan') {
    startScanner();
  } else {
    stopScanner();
  }
}

async function startScanner() {
  if (codeReader) return;

  overlay.style.display = "none";
  overlay.className = "overlay-result";

  codeReader = new ZXing.BrowserQRCodeReader();

  document.getElementById("startBtn").style.display = "none";
  document.getElementById("stopBtn").style.display = "inline-block";

  try {
    codeReader.decodeFromVideoDevice(
      null,
      videoElement,
      (result, err) => {
        if (result) {
          const value = result.text.trim();
          handleResult(value);
          saveToHistory(value);
          stopScanner();
          loadHistory();
        }
      }
    );
  } catch (err) {
    showOverlay("Erreur caméra", "error");
  }
}

function handleResult(value) {
  if (value === "acheteur1") {
    showOverlay("Success", "success");
  } else if (value === "acheteur2") {
    showOverlay("Echec", "error");
  } else {
    showOverlay("QR inconnu", "error");
  }
}

function showOverlay(message, type) {
  overlay.textContent = message;
  overlay.style.display = "flex";
  overlay.classList.add(type);
}

function stopScanner() {
  if (codeReader) {
    codeReader.reset();
    codeReader = null;
  }

  document.getElementById("startBtn").style.display = "inline-block";
  document.getElementById("stopBtn").style.display = "none";
}

function saveToHistory(data) {
  let history = JSON.parse(localStorage.getItem("qrHistory")) || [];
  history.push({
    value: data,
    date: new Date().toLocaleString()
  });
  localStorage.setItem("qrHistory", JSON.stringify(history));
}

function loadHistory() {
  let history = JSON.parse(localStorage.getItem("qrHistory")) || [];
  const historyList = document.getElementById("history");
  historyList.innerHTML = "";

  history.slice().reverse().forEach(item => {
    let li = document.createElement("li");
    li.textContent = item.date + " - " + item.value;
    historyList.appendChild(li);
  });
}

loadHistory();
</script>

</body>
</html>
