<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner QR4</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 0;
  margin: 0;
  background: #f4f6f8;
}

.tabs {
  display: flex;
  background: #0078D4;
}

.tab-button {
  flex: 1;
  padding: 15px;
  border: none;
  background: #0078D4;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.tab-button.active {
  background: #005fa3;
}

.tab-content {
  display: none;
  padding: 20px;
}

.tab-content.active {
  display: block;
}

video {
  width: 100%;
  max-width: 350px;
  border-radius: 12px;
}

button.action {
  padding: 14px 20px;
  margin: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #0078D4;
  color: white;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
  max-width: 400px;
  margin: 20px auto;
  text-align: left;
}

li {
  background: white;
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 4px;
  font-size: 14px;
  word-break: break-all;
}

#result {
  margin-top: 15px;
  font-weight: bold;
  color: #0078D4;
}
</style>
</head>

<body>

<div class="tabs">
  <button class="tab-button active" onclick="openTab(event,'home')">Home</button>
  <button class="tab-button" onclick="openTab(event,'scan')">Scan</button>
</div>

<div id="home" class="tab-content active">
  <h2>🏠 Accueil</h2>
  <p>Bienvenue dans l'application Scanner QR4.</p>
  <p>Allez dans l'onglet Scan pour démarrer automatiquement la caméra.</p>
</div>

<div id="scan" class="tab-content">
  <h2>📷 Scanner QR4</h2>

  <video id="video" muted playsinline></video>
  <br>
  <button class="action" onclick="stopScanner()">Stop</button>
  <button class="action" onclick="clearHistory()">Effacer historique</button>

  <p id="result"></p>

  <h3>Historique</h3>
  <ul id="history"></ul>
</div>

<script>
let codeReader = null;
let videoElement = document.getElementById('video');

function openTab(evt, tabName) {

  // Hide all tabs
  document.querySelectorAll('.tab-content').forEach(tab => {
    tab.classList.remove('active');
  });

  document.querySelectorAll('.tab-button').forEach(btn => {
    btn.classList.remove('active');
  });

  // Show selected tab
  document.getElementById(tabName).classList.add('active');
  evt.currentTarget.classList.add('active');

  // Auto start / stop camera
  if (tabName === 'scan') {
    startScanner();
  } else {
    stopScanner();
  }
}

async function startScanner() {
  if (codeReader) return;

  codeReader = new ZXing.BrowserQRCodeReader();

  try {
    codeReader.decodeFromVideoDevice(
      null,
      videoElement,
      (result, err) => {
        if (result) {
          const value = result.text;
          saveToHistory(value);
          document.getElementById("result").textContent = "QR détecté : " + value;
          stopScanner();
          loadHistory();
        }
      }
    );
  } catch (err) {
    document.getElementById("result").textContent = "Erreur caméra : " + err;
  }
}

function stopScanner() {
  if (codeReader) {
    codeReader.reset();
    codeReader = null;
  }
}

function saveToHistory(data) {
  let history = JSON.parse(localStorage.getItem("qrHistory")) || [];
  history.push({
    value: data,
    date: new Date().toLocaleString()
  });
  localStorage.setItem("qrHistory", JSON.stringify(history));
}

function loadHistory() {
  let history = JSON.parse(localStorage.getItem("qrHistory")) || [];
  const historyList = document.getElementById("history");
  historyList.innerHTML = "";

  history.slice().reverse().forEach(item => {
    let li = document.createElement("li");
    li.textContent = item.date + " - " + item.value;
    historyList.appendChild(li);
  });
}

function clearHistory() {
  localStorage.removeItem("qrHistory");
  loadHistory();
}

loadHistory();
</script>

</body>
</html>
